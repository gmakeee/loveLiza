<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Лизы 🩷</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hue: 340;
      --glow: rgba(220, 38, 100, 0.12);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080006;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      user-select: none;
      transition: background 1s ease;
    }

    /* Stars */
    #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50% { opacity: var(--op, 0.6); transform: scale(1.2); }
    }

    /* Ambient background glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 700px; height: 700px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite;
      transition: background 1s ease;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* Name */
    .name {
      position: relative; z-index: 10;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: rgba(255, 160, 190, 0.55);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Heart */
    .heart-wrap {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 40px;
    }

    .heart-btn {
      background: none; border: none; cursor: pointer;
      outline: none; padding: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .heart-btn svg {
      width: clamp(110px, 28vw, 170px);
      height: clamp(110px, 28vw, 170px);
      filter: drop-shadow(0 0 32px rgba(220, 38, 100, 0.45));
      transition: filter 0.4s;
    }
    .heart-btn:hover svg {
      filter: drop-shadow(0 0 55px rgba(220, 38, 100, 0.75));
    }

    .heart-path {
      fill: #c0154a;
      transition: fill 0.6s ease;
    }

    .heart-btn.beat svg { animation: beat 0.45s ease; }
    @keyframes beat {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.38); }
      65%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    /* Click count badge on heart */
    .heart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: linear-gradient(135deg, #ff5a8e, #e8185c);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.4s, transform 0.4s;
      box-shadow: 0 2px 10px rgba(232, 24, 92, 0.5);
    }
    .heart-badge.show { opacity: 1; transform: scale(1); }

    /* Pulse ring */
    .pulse-ring {
      position: absolute;
      width: clamp(110px, 28vw, 170px);
      height: clamp(110px, 28vw, 170px);
      border-radius: 50%;
      border: 2px solid rgba(220, 38, 100, 0.55);
      animation: ring-out 0.9s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ring-out {
      0%   { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* Message */
    .message-box {
      position: relative; z-index: 10;
      min-height: 90px;
      max-width: min(500px, 90vw);
      text-align: center;
      padding: 0 24px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 3.5vw, 1.55rem);
      line-height: 1.65;
      color: #fff;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .message.visible { opacity: 1; transform: translateY(0); }
    .message.hiding  { opacity: 0; transform: translateY(-14px); }
    .message em { color: #f4789a; font-style: italic; }
    .message strong { color: #ffb3ce; font-style: normal; }

    /* Big counter */
    .counter-wrap {
      position: relative; z-index: 10;
      margin-top: 36px;
      text-align: center;
      min-height: 64px;
    }
    .counter-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 700;
      line-height: 1;
      color: transparent;
      background: linear-gradient(135deg, #ff6fa8, #e8185c, #ff9ec4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      transition: opacity 0.5s, transform 0.3s;
      transform: scale(0.85);
    }
    .counter-num.show { opacity: 1; transform: scale(1); }
    .counter-num.pop  { animation: num-pop 0.3s ease; }
    @keyframes num-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .counter-label {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Milestone toast */
    .toast {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 130, 170, 0.3);
      backdrop-filter: blur(16px);
      padding: 14px 28px;
      border-radius: 999px;
      color: #ffcde0;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.5s ease;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Hint */
    .hint {
      position: relative; z-index: 10;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 1s;
    }
    .hint.hidden { opacity: 0; pointer-events: none; }

    /* Float particles */
    .particle {
      position: fixed; pointer-events: none; z-index: 5;
      animation: float-up var(--dur, 2s) ease-out forwards;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-260px) scale(0.2) rotate(25deg); opacity: 0; }
    }

    /* Confetti piece */
    .confetti {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 5;
      animation: confetti-fall var(--dur, 2s) ease-out forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="stars"></div>
  <div class="bg-glow"></div>

  <div class="name">Лиза</div>

  <div class="heart-wrap">
    <button class="heart-btn" id="heartBtn" onclick="handleClick(event)" aria-label="Нажми на сердце">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path class="heart-path" id="heartPath" d="M50 85 C50 85 5 55 5 28 C5 13 17 3 30 3 C39 3 47 8 50 15 C53 8 61 3 70 3 C83 3 95 13 95 28 C95 55 50 85 50 85Z"/>
      </svg>
      <div class="heart-badge" id="badge"></div>
    </button>
  </div>

  <div class="message-box">
    <p class="message" id="msg"></p>
  </div>

  <div class="hint" id="hint">нажми на сердце</div>

  <div class="counter-wrap">
    <div class="counter-num" id="counterNum">0</div>
    <div class="counter-label" id="counterLabel" style="opacity:0">раз сказал тебе это</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const messages = [
      "Я люблю тебя, <em>Лиза</em>.",
      "Ты - лучшее, что со мной случилось.",
      "С тобой даже обычный день становится особенным.",
      "Я думаю о тебе чаще, чем ты <em>можешь представить</em>.",
      "Ты делаешь меня лучше - просто своим присутствием.",
      "Люблю тебя сегодня чуть больше, чем вчера.",
      "Ты - моё любимое место в этом мире.",
      "Каждый раз, когда ты улыбаешься, я влюбляюсь заново.",
      "Я рядом. Всегда. <em>Для тебя.</em>",
      "Ты - самый важный человек в моей жизни.",
      "С тобой мне не нужно больше ничего.",
      "Мне нравится, какая ты есть.",
      "Ты моя <em>Лиза</em> - и это всё объясняет.",
      "Я бесконечно рад, что ты есть.",
      "Каждый день с тобой - подарок.",
      "Ты красивее всего на свете. Объективно.",
      "Я выбираю тебя. Снова и снова.",
      "Люблю тебя до самых краёв - а сердце большое.",
      "Ты - мой <em>тихий уют</em> в этом шумном мире.",
      "Если бы можно было выбрать снова - только ты.",
      "Ты знаешь, как меня успокоить, даже не зная об этом.",
      "Твой смех - мой любимый звук.",
      "Я хочу, чтобы тебе было хорошо. Всегда.",
      "С тобой не страшно. Совсем.",
      "Ты моя самая любимая <em>глупость</em>.",
      "Некоторые вещи не нужно объяснять. Ты - одна из них.",
      "Я скучаю по тебе, даже когда ты рядом.",
      "Ты делаешь мой мир <strong>теплее</strong>.",
      "Любить тебя - самое естественное, что я умею.",
      "Ты замечательная. Я просто хочу, чтобы ты это знала.",
      "Мне нравится, как ты думаешь. И как ты смотришь. И вообще.",
      "Ты - <em>моя</em>. И я очень этому рад.",
      "Каждое утро лучше, когда ты в нём есть.",
      "Я благодарен за тебя каждый день.",
      "Нет никого, с кем я хотел бы быть больше, чем с тобой.",
      "Ты - дом. Где бы мы ни были.",
      "Люблю тебя <em>очень сильно</em>. Это важно знать.",
      "Ты - моя <strong>любимая история</strong>.",
      "Иногда я смотрю на тебя и не верю, что так бывает.",
      "Ты лучше, чем я заслуживаю. И я постараюсь догнать.",
    ];

    const milestones = {
      5:   "5 раз - и я всё равно не устал 🩷",
      10:  "10! Лиза, ты идеальная ✨",
      20:  "20 раз - это уже серьёзно 😍",
      50:  "50!! Ты точно лучшая в мире 🌸",
      100: "100 раз. Сотня. Я не останавливаюсь 💫",
    };

    // Heart color stages
    const heartColors = [
      { at: 0,   fill: '#c0154a' },
      { at: 10,  fill: '#d42060' },
      { at: 25,  fill: '#e8305e' },
      { at: 50,  fill: '#ff4d77' },
      { at: 100, fill: '#ff6fa8' },
    ];

    let clicks = 0;
    let lastIndex = -1;
    const msgEl = document.getElementById('msg');
    const hintEl = document.getElementById('hint');
    const counterNum = document.getElementById('counterNum');
    const counterLabel = document.getElementById('counterLabel');
    const badge = document.getElementById('badge');
    const toast = document.getElementById('toast');
    const heartPath = document.getElementById('heartPath');
    const heartBtn = document.getElementById('heartBtn');

    // Build stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = 1 + Math.random() * 2.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${2 + Math.random() * 4}s;
        --op:${0.3 + Math.random() * 0.6};
        animation-delay:${Math.random() * 5}s;
      `;
      starsContainer.appendChild(s);
    }

    function getRandom() {
      let idx;
      do { idx = Math.floor(Math.random() * messages.length); }
      while (idx === lastIndex);
      lastIndex = idx;
      return messages[idx];
    }

    function handleClick(e) {
      clicks++;

      hintEl.classList.add('hidden');

      // Pulse ring
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      heartBtn.parentElement.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove());

      // Beat
      heartBtn.classList.remove('beat');
      void heartBtn.offsetWidth;
      heartBtn.classList.add('beat');
      heartBtn.addEventListener('animationend', () => heartBtn.classList.remove('beat'), { once: true });

      // Particles
      spawnParticles();

      // Message
      showMessage(getRandom());

      // Counter update
      updateCounter();

      // Badge
      badge.textContent = clicks;
      badge.classList.add('show');

      // Heart color
      updateHeartColor();

      // Milestone
      if (milestones[clicks]) {
        if (clicks === 50 || clicks === 100) spawnConfetti();
        showToast(milestones[clicks]);
      }
    }

    function updateCounter() {
      counterNum.classList.add('show');
      counterLabel.style.opacity = '1';
      counterNum.textContent = clicks;
      counterNum.classList.remove('pop');
      void counterNum.offsetWidth;
      counterNum.classList.add('pop');
    }

    function updateHeartColor() {
      let color = heartColors[0].fill;
      for (const stage of heartColors) {
        if (clicks >= stage.at) color = stage.fill;
      }
      heartPath.style.fill = color;
    }

    function showMessage(html) {
      if (msgEl.classList.contains('visible')) {
        msgEl.classList.add('hiding');
        setTimeout(() => {
          msgEl.innerHTML = html;
          msgEl.classList.remove('hiding', 'visible');
          void msgEl.offsetWidth;
          msgEl.classList.add('visible');
        }, 280);
      } else {
        msgEl.innerHTML = html;
        msgEl.classList.add('visible');
      }
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3200);
    }

    function spawnParticles() {
      const emojis = ['❤️', '🩷', '💕', '💗', '💓', '✨', '💖', '🌸', '💝', '🫶'];
      const count = 6 + Math.floor(Math.random() * 6);
      const rect = heartBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = (cx + (Math.random() - 0.5) * 140) + 'px';
        p.style.top  = (cy + (Math.random() - 0.5) * 80) + 'px';
        p.style.fontSize = (13 + Math.random() * 18) + 'px';
        p.style.setProperty('--dur', (1.4 + Math.random() * 1.2) + 's');
        p.style.animationDelay = (Math.random() * 0.25) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    function spawnConfetti() {
      const colors = ['#ff6fa8','#ffc2d4','#ffe4ec','#e8185c','#ffb3ce','#fff'];
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = (20 + Math.random() * 60) + 'vw';
        c.style.top = '-20px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.setProperty('--dur', (1.5 + Math.random() * 2) + 's');
        c.style.animationDelay = (Math.random() * 0.8) + 's';
        document.body.appendChild(c);
        c.addEventListener('animationend', () => c.remove());
      }
    }
  </script>
</body>
</html>
