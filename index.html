<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Лизы</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0008;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    /* Ambient background glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(220, 38, 100, 0.12) 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* Name top */
    .name {
      position: relative;
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: rgba(255, 160, 190, 0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 48px;
      transition: opacity 0.5s;
    }

    /* Heart button */
    .heart-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    .heart-btn {
      background: none;
      border: none;
      cursor: pointer;
      outline: none;
      padding: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart-btn svg {
      width: clamp(100px, 25vw, 160px);
      height: clamp(100px, 25vw, 160px);
      filter: drop-shadow(0 0 30px rgba(220, 38, 100, 0.4));
      transition: filter 0.3s;
    }

    .heart-btn:hover svg {
      filter: drop-shadow(0 0 50px rgba(220, 38, 100, 0.7));
    }

    .heart-path {
      fill: #c0154a;
      transition: fill 0.2s;
    }
    .heart-btn:hover .heart-path {
      fill: #e8185c;
    }

    .heart-btn.beat svg {
      animation: beat 0.5s ease;
    }
    @keyframes beat {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.35); }
      60%  { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    /* Pulse rings on click */
    .pulse-ring {
      position: absolute;
      width: clamp(100px, 25vw, 160px);
      height: clamp(100px, 25vw, 160px);
      border-radius: 50%;
      border: 2px solid rgba(220, 38, 100, 0.6);
      animation: ring-out 0.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ring-out {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* Message area */
    .message-box {
      position: relative;
      z-index: 10;
      min-height: 100px;
      max-width: min(480px, 90vw);
      text-align: center;
      padding: 0 20px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      line-height: 1.6;
      color: #fff;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .message.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .message.hiding {
      opacity: 0;
      transform: translateY(-12px);
    }

    .message em {
      color: #f06090;
      font-style: italic;
    }

    /* Hint */
    .hint {
      position: relative;
      z-index: 10;
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 1s;
    }
    .hint.hidden { opacity: 0; }

    /* Floating hearts particle */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      font-size: 18px;
      animation: float-up 2s ease-out forwards;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-220px) scale(0.3) rotate(30deg); opacity: 0; }
    }

    /* Counter */
    .counter {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="name">Лиза</div>

  <div class="heart-wrap">
    <button class="heart-btn" id="heartBtn" onclick="handleClick(event)" aria-label="Нажми на сердце">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path class="heart-path" d="M50 85 C50 85 5 55 5 28 C5 13 17 3 30 3 C39 3 47 8 50 15 C53 8 61 3 70 3 C83 3 95 13 95 28 C95 55 50 85 50 85Z"/>
      </svg>
    </button>
  </div>

  <div class="message-box">
    <p class="message" id="msg"></p>
  </div>

  <div class="hint" id="hint">нажми на сердце</div>

  <div class="counter" id="counter"></div>

  <script>
    const messages = [
      "Я люблю тебя, <em>Лиза</em>.",
      "Ты - лучшее, что со мной случилось.",
      "С тобой даже обычный день становится особенным.",
      "Я думаю о тебе чаще, чем ты <em>можешь представить</em>.",
      "Ты делаешь меня лучше - просто своим присутствием.",
      "Люблю тебя сегодня чуть больше, чем вчера.",
      "Ты - моё любимое место в этом мире.",
      "Каждый раз, когда ты улыбаешься, я влюбляюсь заново.",
      "Я рядом. Всегда. <em>Для тебя.</em>",
      "Ты - самый важный человек в моей жизни.",
      "С тобой мне не нужно больше ничего.",
      "Мне нравится, какая ты есть.",
      "Ты моя <em>Лиза</em> - и это всё объясняет.",
      "Я бесконечно рад, что ты есть.",
      "Каждый день с тобой - подарок.",
      "Ты красивее всего на свете. Объективно.",
      "Я выбираю тебя. Снова и снова.",
      "Люблю тебя до самых краёв сердца - а оно большое.",
      "Ты - мой <em>тихий уют</em> в этом шумном мире.",
      "Если бы можно было выбрать снова - я бы выбрал только тебя.",
    ];

    let clicks = 0;
    let msgEl = document.getElementById('msg');
    let hintEl = document.getElementById('hint');
    let counterEl = document.getElementById('counter');
    let heartBtn = document.getElementById('heartBtn');
    let lastIndex = -1;
    let isAnimating = false;

    function getRandom() {
      let idx;
      do { idx = Math.floor(Math.random() * messages.length); }
      while (idx === lastIndex);
      lastIndex = idx;
      return messages[idx];
    }

    function handleClick(e) {
      clicks++;
      hintEl.classList.add('hidden');

      // Pulse ring
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      heartBtn.parentElement.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove());

      // Beat animation
      heartBtn.classList.remove('beat');
      void heartBtn.offsetWidth;
      heartBtn.classList.add('beat');
      heartBtn.addEventListener('animationend', () => heartBtn.classList.remove('beat'), { once: true });

      // Floating particles
      spawnParticles(e);

      // Show message
      showMessage(getRandom());

      // Counter
      if (clicks > 1) {
        counterEl.textContent = clicks + ' раз';
      }
    }

    function showMessage(html) {
      if (msgEl.classList.contains('visible')) {
        msgEl.classList.add('hiding');
        setTimeout(() => {
          msgEl.innerHTML = html;
          msgEl.classList.remove('hiding', 'visible');
          void msgEl.offsetWidth;
          msgEl.classList.add('visible');
        }, 300);
      } else {
        msgEl.innerHTML = html;
        msgEl.classList.add('visible');
      }
    }

    function spawnParticles(e) {
      const emojis = ['❤️', '🩷', '💕', '💗', '💓', '✨', '💖'];
      const count = 6 + Math.floor(Math.random() * 5);
      const rect = heartBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = (cx + (Math.random() - 0.5) * 120) + 'px';
        p.style.top = (cy + (Math.random() - 0.5) * 60) + 'px';
        p.style.fontSize = (14 + Math.random() * 16) + 'px';
        p.style.animationDelay = (Math.random() * 0.3) + 's';
        p.style.animationDuration = (1.5 + Math.random() * 1) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }
  </script>
</body>
</html>
